<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/imagens/favicon_Emerald.png" />
    <link rel="apple-touch-icon" href="/imagens/favicon_Emerald.png" />

    <!-- Primary SEO -->
    <title>Emerald Group — Global Diversified Investment Group</title>
    <meta name="description" content="Emerald Group is a diversified holding company that invests in and develops strategic business platforms across banking, infrastructure, natural resources, technology, media, and real estate." />
    <meta name="keywords" content="Emerald Group, investment, Africa, banking, infrastructure, natural resources, technology, media, real estate, holding company, emerging markets" />

    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://emeraldgroup-inc.com/" />

    <!-- Open Graph (Facebook, LinkedIn, WhatsApp) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://emeraldgroup-inc.com/" />
    <meta property="og:title" content="Emerald Group — Global Diversified Investment Group" />
    <meta property="og:description" content="Building enduring global business platforms with purpose. Emerald Group invests across banking, infrastructure, natural resources, technology, media and real estate." />
    <meta property="og:image" content="https://d2xsxph8kpxj0f.cloudfront.net/310519663184082639/28Rt9uMprGDPTN4Qw2hwyo/emerald-logo-transparent_aa2bef6f.png" />

    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="Emerald Group" />
    <meta property="og:locale" content="en_GB" />

    <!-- Twitter / X Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Emerald Group — Global Diversified Investment Group" />
    <meta name="twitter:description" content="Building enduring global business platforms with purpose. Emerald Group invests across banking, infrastructure, natural resources, technology, media and real estate." />
    <meta name="twitter:image" content="https://d2xsxph8kpxj0f.cloudfront.net/310519663184082639/28Rt9uMprGDPTN4Qw2hwyo/emerald-logo-transparent_aa2bef6f.png" />

    <!-- Theme colour (browser tab / mobile status bar) -->
    <meta name="theme-color" content="#02d49e" />

    <!-- Preconnect Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  </head>
